name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: upstream-sync
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and update upstream-sync branch
        run: |
          git remote add upstream https://github.com/infobyte/faraday.git
          git fetch upstream
          git reset --hard upstream/master
          git push origin upstream-sync --force-with-lease

      - name: Open PR into master if there are new changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin master
          DIFF=$(git log origin/master..upstream-sync --oneline)
          if [ -z "$DIFF" ]; then
            echo "No new upstream changes. Skipping PR."
            exit 0
          fi

          EXISTING=$(gh pr list --head upstream-sync --base master --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR #$EXISTING already open. Skipping."
            exit 0
          fi

          COUNT=$(echo "$DIFF" | wc -l | tr -d ' ')

          gh pr create \
            --title "chore: sync $COUNT upstream commit(s) from infobyte/faraday" \
            --body "Automated upstream sync from [infobyte/faraday](https://github.com/infobyte/faraday).

          **Review before merging:** check if any upstream changes conflict with your app modifications.

          New commits:
          \`\`\`
          $DIFF
          \`\`\`" \
            --head upstream-sync \
            --base master \
            --label "upstream-sync" || true
