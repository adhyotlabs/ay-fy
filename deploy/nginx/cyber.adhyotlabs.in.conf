# nginx reverse proxy config for Faraday at cyber.adhyotlabs.in
#
# The map directive is required — sending Connection: upgrade unconditionally
# causes Faraday's gevent server to wait for a WebSocket handshake on all
# requests (including the login POST), which hangs the browser.
#
# Deploy: copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
# SSL:    sudo certbot --nginx -d cyber.adhyotlabs.in

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name cyber.adhyotlabs.in;

    location / {
        proxy_pass http://127.0.0.1:5985;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cyber.adhyotlabs.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cyber.adhyotlabs.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = cyber.adhyotlabs.in) {
        return 301 https://$host$request_uri;
    }
    server_name cyber.adhyotlabs.in;
    listen 80;
    return 404;
}
